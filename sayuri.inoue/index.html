ttp-equiv=\"content-type\" content=\"text/html; charset=utf-8\"><div dir=\"ltr\"><span></span></div><div dir=\"ltr\"><meta http-equiv=\"content-type\" content=\"text/html; charset=utf-8\"><div dir=\"ltr\"><span></span></div><div dir=\"ltr\"><div dir=\"ltr\"><span></span></div><div dir=\"ltr\"><meta http-equiv=\"content-type\" content=\"text/html; charset=utf-8\"><div dir=\"ltr\"><span></span></div><div dir=\"ltr\"><meta http-equiv=\"content-type\" content=\"text/html; charset=utf-8\"><div dir=\"ltr\"><span></span></div><div dir=\"ltr\"><meta http-equiv=\"content-type\" content=\"text/html; charset=utf-8\"><div dir=\"ltr\"><span></span></div><div dir=\"ltr\"><meta http-equiv=\"content-type\" content=\"text/html; charset=utf-8\"><div dir=\"ltr\"><span></span></div><div dir=\"ltr\"><meta http-equiv=\"content-type\" content=\"text/html; charset=utf-8\"><div dir=\"ltr\"><span></span></div><div dir=\"ltr\"><meta http-equiv=\"content-type\" content=\"text/html; charset=utf-8\"><div dir=\"ltr\"><span></span></div><div dir=\"ltr\"><meta http-equiv=\"content-type\" content=\"text/html; charset=utf-8\"><div dir=\"ltr\"><span></span></div><div dir=\"ltr\"><meta http-equiv=\"content-type\" content=\"text/html; charset=utf-8\"><div dir=\"ltr\"><span></span></div><div dir=\"ltr\"><span></span><br></div><div dir=\"ltr\">　<br></div><div dir=\"ltr\"><div style=\"text-align: start;\"><span style=\"text-align: justify; background-color: rgba(255, 255, 255, 0);\"><br></span></div><div style=\"text-align: justify;\">お知らせです</div><div style=\"text-align: start;\">　<br></div><div style=\"text-align: start;\">以前より休業という形で</div><div style=\"text-align: start;\">活動辞退を発表しておりましたが、</div><div style=\"text-align: start;\">それは、卒業に向けてのもの<span style=\"text-align: justify; background-color: rgba(255, 255, 255, 0);\">でした</span></div></div><div dir=\"ltr\">　<br></div><div dir=\"ltr\">突然の発表で申し訳ありませんが</div><div dir=\"ltr\"><div dir=\"ltr\"><span style=\"background-color: rgba(255, 255, 255, 0);\">自分の中では今年の春、</span></div><div dir=\"ltr\"><span style=\"background-color: rgba(255, 255, 255, 0);\">卒業というものが具体的に</span><span style=\"background-color: rgba(255, 255, 255, 0);\">なって</span></div><div dir=\"ltr\">これまで必死に活動してきた分、</div><div dir=\"ltr\"><span style=\"background-color: rgba(255, 255, 255, 0);\">今年からは自分のことに専念できる</span></div><div dir=\"ltr\"><span style=\"background-color: rgba(255, 255, 255, 0);\">ようにしたいと思っていたので、</span></div><div dir=\"ltr\">とてもとても前向きな卒業です！！</div><div dir=\"ltr\">( *´﹀`* )</div><div dir=\"ltr\"><div dir=\"ltr\">　<br></div></div><div dir=\"ltr\">　<br></div><div dir=\"ltr\">大きな分岐点にはなると思いますが、</div><div dir=\"ltr\">乃木坂で出会えたファンの方たちには</div><div dir=\"ltr\">たくさん感謝しており、</div><div dir=\"ltr\">それはこれからも変わりません</div><div dir=\"ltr\">　<br></div><div dir=\"ltr\"><div dir=\"ltr\"><span style=\"background-color: rgba(255, 255, 255, 0);\">本当に色んな瞬間を支えて頂いた、</span></div></div><div dir=\"ltr\">自分の人生にとって</div><div dir=\"ltr\">とても大切な存在です</div><div dir=\"ltr\">　<br></div><div dir=\"ltr\">　<br></div><div dir=\"ltr\">　<br></div><div dir=\"ltr\">そして、乃木坂46を好きな気待ちも</div><div dir=\"ltr\">これからも全く変わらないです</div><div dir=\"ltr\">　<br></div></div><div dir=\"ltr\"><div dir=\"ltr\"><div>自分にとって、ここは</div><div>本当にかけがえのない場所です</div><div>　<br></div><div>最初からこの場所が永遠ではないと思って</div><div>いながらも、こんなにも頑張ってこれたのは</div><div>間違いなくメンバーのおかげです</div><div>メンバーと居る時間が楽しすぎて、</div><div>自分が想像していたより遥かに長く</div><div>在籍してしまいました笑</div><div>みんなと出会えて本当によかったです</div><div><div><span style=\"background-color: rgba(255, 255, 255, 0);\">わたしにとってはひとときの</span></div><div><span style=\"background-color: rgba(255, 255, 255, 0);\">奇跡のような、最高の居場所でした</span></div></div><div>　<br></div><div>この経験を決して無駄にしないように、</div><div>出会った人たちに全ての感謝の気持ちを込めて</div><div>前へ進みたいなと思ってます</div><div>この先、後輩達が色んな夢を追って</div><div>活動していけるように</div><div>素敵な道をつくっていけたらと思ってます</div><div>　<br></div><div>これからも沢山の人に愛される</div><div>グループでありますうに！</div><div>　<br></div><div>　<br></div><div><div dir=\"ltr\"><span style=\"background-color: rgba(255, 255, 255, 0);\">詳しい卒業日程は追ってお知らせしますが</span></div><div dir=\"ltr\"><span style=\"background-color: rgba(255, 255, 255, 0);\">現在出演が決まっている、</span></div><div dir=\"ltr\"><span style=\"background-color: rgba(255, 255, 255, 0);\">来年春のミュージカル</span></div><div dir=\"ltr\"><div dir=\"ltr\"><span style=\"background-color: rgba(255, 255, 255, 0);\">「リトル・ショップ・オブ・ホラーズ」までは</span></div></div><div dir=\"ltr\"><span style=\"background-color: rgba(255, 255, 255, 0);\">乃木坂46として活動する予定です</span></div></div><div>　<br></div><div>　<br></div><div>　<br></div><div>ではまた！</div><div>　<br></div><div>　<br></div><div><img src=\"img/blog/sayuri.inoue/img/2019/10/05/6168587/0000.jpeg\" alt=\"image8.jpeg\" id=\"E0F16B11-854D-4239-A0F6-7F0FE3AE0D0C\"><br></div><div>　<br></div><div>　<br></div><div>　<br></div><div><img src=\"img/blog/sayuri.inoue/img/2019/10/05/6168587/0001.jpeg\" alt=\"image1.jpeg\" id=\"4F6F9B74-6367-40E1-AC79-9894A92D41E0\"><br></div></div></div><div dir=\"ltr\">　<br></div><div dir=\"ltr\">　<br></div><div dir=\"ltr\">　<br></div><div dir=\"ltr\">井上小百合</div><div dir=\"ltr\"><span></span><br></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div><div dir=\"ltr\"></div></div></body></html> "},{"datetime":"2019/09/25 12:30","author":"井上小百合","title":"ヽ(｡･ω･｡) ベス","url":"http://blog.nogizaka46.com/sayuri.inoue/2019/09/052749.php","content":"<br>  <br>  ミュージカル<br>  『LITTLE WOMEN －若草物語－』<br>  本日、東京公演ラストです<br>  <br>  次は愛知、その次は福岡！<br>  <br>  最後までベスとして、<br>  楽しく生きたいと思います<br>  <br> <img src=\"img/blog/sayuri.inoue/img/2019/09/25/8206328/0000.jpeg\"><br> <br> <br> <br> <br> <br> <br> <br> <img src=\"img/blog/sayuri.inoue/img/2019/09/25/8206328/0001.jpeg\"><br>  <br>  <br>  <br>  <br>  沢山の方が見に来てくださって<br>  本当にうれしいです<br>  <br>  <br> <img src=\"img/blog/sayuri.inoue/img/2019/09/25/8206328/0002.jpeg\"><br>  <br>  こうじさん〜<br>  <br>  <br>  この作品を通して、色々な方から、<br>  色々な有難い言葉を頂きました<br>  <br>  でもそこには沢山の方の支えがあって、<br>  一人で頑張れたことなんてひとつもなくて。<br>  <br>  だから、なんというか、そこに驕らず、<br>  でも有難く謙虚に受け止めながら<br>  もっと精進しなければならないな、<br>  と、日々過ごしておりました<br>  <br>  <br>  勿論、ここまで一人の人間の夢に、人生に<br>  対して、真剣に向き合ってくれた<br>  乃木坂46というグループにも、<br>  とても感謝しています<br>  ファンの皆さんやメンバーの皆にも<br>  本当に心から感謝でいっぱいです<br>  <br>  休業という道を、自ら選び経験してみる<br>  ことで、乃木坂46というグループを<br>  また新たな角度から見ることができて、<br>  沢山の発見がありました<br>  元々役者志望だった自分が乃木坂46と<br>  出会ってから、本当に世界が変わりました<br>  <br>  <br>  今は、どんな現場でも、必ず<br>  「乃木坂の子」というふうに評価を受けます<br>  そこで、最大限の力を発揮して<br>  みんなに恩返しできるよう、<br>  精一杯がんばりたいと思います<br>  <br>  フラガールの稽古も始まっています<br>  がんばる！！<br>  <br>  <br>  さゆ<br>  <br> "},{"datetime":"2019/09/13 12:36","author":"井上小百合","title":"ヽ(｡･ω･｡)学び","url":"http://blog.nogizaka46.com/sayuri.inoue/2019/09/052591.php","content":"<html><head><meta http-equiv=\"content-type\" content=\"text/html; charset=utf-8\"></head><body dir=\"auto\"><div dir=\"ltr\"><span></span></div><div dir=\"ltr\"><meta http-equiv=\"content-type\" content=\"text/html; charset=utf-8\"><div dir=\"ltr\"><span></span></div><div dir=\"ltr\"><meta http-equiv=\"content-type\" content=\"text/html; charset=utf-8\"><div dir=\"ltr\"><span></span></div><div dir=\"ltr\"><meta http-equiv=\"content-type\" content=\"text/html; charset=utf-8\"><div dir=\"ltr\"><span></span></div><div dir=\"ltr\"><meta http-equiv=\"content-type\" content=\"text/html; charset=utf-8\"><div dir=\"ltr\"><span></span></div><div dir=\"ltr\">　<br></div><div dir=\"ltr\">　<br></div><div dir=\"ltr\">みなさん元気ですか〜？？</div><div dir=\"ltr\">　<br></div><div dir=\"ltr\">　<br></div><div dir=\"ltr\">わたしはこの通り元気です！</div><div dir=\"ltr\">これ数ヶ月前の写真だけど。</div><div dir=\"ltr\">　<br></div><div dir=\"ltr\"><img src=\"img/blog/sayuri.inoue/img/2019/09/13/4546763/0000.jpeg\" alt=\"image1.jpeg\" id=\"C7AA3613-B822-45C1-A44D-2D503EE9AC07\"><br></div><div dir=\"ltr\">　<br></div><div dir=\"ltr\">大百合と小百合。笑</div><div dir=\"ltr\">　<br></div><div dir=\"ltr\"><span></span><br></div><div dir=\"ltr\">　<br></div><div dir=\"ltr\"><br><span></span><br><span style=\"background-color: rgba(255, 255, 255, 0);\">ミュージカル<br>『LITTLE WOMEN －若草物語－』</span></div><div dir=\"ltr\"><br><span>幕が開いてから10日が経ちました</span><br><span></span><br><span>ベスから、命の大切さ、</span><br><span>生きることの尊さを日々学んでいます</span><br><span></span><br><span></span><br><span>そして、ジョー、メグ、エイミー、</span></div><div dir=\"ltr\"><span>お母さま、ローリー、ブルックさん、</span></div><div dir=\"ltr\"><span>マーチおばさま、ベア教授、ローレンスさん、</span></div><div dir=\"ltr\"><span>みんなを見ていて</span><br><span></span><br><span>何かを好きになったり、</span><br><span>誰かを大切に思ったりすることは、</span><br><span>本当に本当に素敵で、素晴らしい</span><br><span>ことなのだなあと、毎日学んでいます！</span><br><span></span><br><span></span><br><span>自分の好きなことややりたいことを</span><br><span>見つけて、とことん追求して、努力して、、</span><br><span></span><br><span>そういうことを、限りある時間の中で</span><br><span>もっとやっておかなきゃ</span><br><span>授かった命が勿体ないな、</span><br><span>人生を無駄にしたくないな、と</span><br><span></span><br><span>危機感を感じるというか</span><br><span>若草物語の中に生きていると</span><br><span>毎日毎日、ハッとさせられます</span><br><span></span><br><span></span><br><span></span><br><span>どんなに短くても</span><br><span>いい人生だったと思えるくらい、</span></div><div dir=\"ltr\"><span>ベスは、一瞬一瞬を、</span>丁寧に</div><div dir=\"ltr\">悔いなく生きていたんだろうな</div><div dir=\"ltr\"><span></span><br><span>そして誰に対しても本当に心から</span><br><span>接していたんだと思います</span><br><span>強くてかっこいい。</span><br><span></span><br><span></span><br><span>ベスのような素晴らしい人には</span><br><span>なれないけど、わたしはわたしなりに</span><br><span>精一杯生きて、がんばります</span><br><span></span><br><br></div><div dir=\"ltr\"><img src=\"img/blog/sayuri.inoue/img/2019/09/13/4546763/0001.jpeg\" id=\"6BB78D4A-14F1-4673-ADFD-65F7D8A6F81D\"></div><div dir=\"ltr\"><span></span><br><span>八嶋さん！</span><br><span>来てくれて有難うございます</span><br><span></span><br>泣いたって言ってくれたの、</div><div dir=\"ltr\">最高の褒め言葉です<br><br><span>わたしがプレゼントした</span><br><span>せごどんTシャツも沢山着てくれてて</span><br><span>すごく嬉しいです( ˶ˆoˆ˵ )</span><br><span></span><br><span></span><br><span></span><br><span></span><br><span></span><br><span>そして、</span><br><span>来年春に上演する</span><span style=\"background-color: rgba(255, 255, 255, 0);\">ミュージカル</span></div><div dir=\"ltr\"><span style=\"background-color: rgba(255, 255, 255, 0);\"><br></span></div><div dir=\"ltr\"><span style=\"background-color: rgba(255, 255, 255, 0);\">『リトル・ショップ・オブ・ホラーズ』</span><div dir=\"ltr\"><p style=\"margin: 0px; font-stretch: normal; line-height: normal;\"><br></p></div><br><span>ビジュアルと全キャスト、公演日程などが</span><br><span>公開されました</span></div><div dir=\"ltr\">　<br></div><div dir=\"ltr\"><span style=\"background-color: rgba(255, 255, 255, 0);\">東京、山形、愛知、静岡、大阪を回ります！</span></div><div dir=\"ltr\"><span></span><br><span>きっと楽しいものになると思うので</span><br><span>ぜひ見に来てください〜</span></div><div dir=\"ltr\"><span></span><div dir=\"ltr\"><a href=\"https://www.tohostage.com/little-shop-of-horrors/ticket.html#TOKYO\" style=\"caret-color: rgb(0, 0, 0); background-color: rgba(255, 255, 255, 0);\"><font color=\"#000000\">https://www.tohostage.com/little-shop-of-horrors/ticket.html#TOKYO</font></a></div><span style=\"background-color: rgba(255, 255, 255, 0);\"></span><div dir=\"ltr\">　<br></div><div dir=\"ltr\">　<br></div><br><span>よろしくお願いします</span><br><span></span><br></div><div dir=\"ltr\"><img src=\"img/blog/sayuri.inoue/img/2019/09/13/4546763/0002.jpeg\" id=\"BF915E11-5C61-47C8-AB42-B0D999092A9E\"></div><div dir=\"ltr\">　<br></div><div dir=\"ltr\"><span></span><br><span>さゆ</span></div></div></div></div></div></body></html> "},{"datetime":"2019/09/04 18:00","author":"井上小百合","title":"ヽ(｡･ω･｡)若草ですよ","url":"http://blog.nogizaka46.com/sayuri.inoue/2019/09/052418.php","content":"<br>  <br>  <br>  ミュージカル<br>  『LITTLE WOMEN －若草物語－』<br>  初日、幕が開きました<br>  <br>  沢山の人に支えられてこの日を<br>  迎えることができました<br>  感謝です！<br>  <br>  <br>  ご観劇くださった皆さまは<br>  どんな感想をもったのでしょうか...<br>  <br>  <br>  <br>  舞台は19世紀のお話なので<br>  いまの世の中とは少し違うかもしれませんが<br>  現代にも十分通づる、<br>  愛に溢れた素晴らしい作品です<br>  <br>  <br>  令和のこの時代に、<br>  ベスちゃんのような奥ゆかしい、<br>  透明感のある人物を<br>  演じさせていただくことは<br>  すごく素敵な挑戦な気がしています<br>  <br>  まっ更な心で、真っ直ぐ、<br>  真摯に向き合いたい役です<br>  <br>  ベスは、一見、そうは見えないけど<br>  すごくかっこいい人です<br>  <br>  何がかっこいいかって、<br>  謙虚だけど優しくて、見えている世界が<br>  とてつもなく広くて、強い信念と<br>  覚悟のあるところです<br>  <br>  こんなに病弱なベスから
