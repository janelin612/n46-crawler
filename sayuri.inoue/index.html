<script> const defaultList=[{"datetime":"2020/03/11 22:12","author":"井上小百合","title":"ヽ(｡･ω･｡)きぼうの鐘","url":"http://blog.nogizaka46.com/sayuri.inoue/2020/03/055209.php","content":"<html><head><meta http-equiv=\"content-type\" content=\"text/html; charset=utf-8\"></head><body dir=\"auto\"><div dir=\"ltr\"><meta http-equiv=\"content-type\" content=\"text/html; charset=utf-8\"><div dir=\"ltr\"><meta http-equiv=\"content-type\" content=\"text/html; charset=utf-8\"><div dir=\"ltr\"><meta http-equiv=\"content-type\" content=\"text/html; charset=utf-8\"><div dir=\"ltr\"></div><div dir=\"ltr\">　<br></div><div dir=\"ltr\">昨年、東北出身の知り合いらと共に</div><div dir=\"ltr\">プライベートで女川・石巻などを</div><div dir=\"ltr\">訪れました</div><div dir=\"ltr\">　<br></div><div dir=\"ltr\"><img src=\"img/blog/sayuri.inoue/img/2020/03/11/3215320/0000.jpeg\"><br></div><div dir=\"ltr\">　<br></div><div dir=\"ltr\"><span style=\"font-family: HiraKakuProN-W3, sans; font-size: 16.31999969482422px; -webkit-text-size-adjust: 100%;\">この鐘は、震災前、駅前にあった</span><div><span style=\"font-family: HiraKakuProN-W3, sans; font-size: 16.31999969482422px; -webkit-text-size-adjust: 100%;\">「からくり時計」に付いていた</span></div><div><span style=\"font-family: HiraKakuProN-W3, sans; font-size: 16.31999969482422px; -webkit-text-size-adjust: 100%;\">四つの鐘のうちの一つらしく、</span></div><div><span style=\"font-family: HiraKakuProN-W3, sans; font-size: 16.31999969482422px; -webkit-text-size-adjust: 100%;\"><br></span></div><div><span style=\"font-family: HiraKakuProN-W3, sans; font-size: 16.31999969482422px; -webkit-text-size-adjust: 100%;\">それが、津波で流失後、がれきの中から</span></div><div><span style=\"font-family: HiraKakuProN-W3, sans; font-size: 16.31999969482422px; -webkit-text-size-adjust: 100%;\">一つだけ</span><span style=\"font-family: HiraKakuProN-W3, sans; font-size: 16.31999969482422px; -webkit-text-size-adjust: 100%;\">見つかったそうです</span></div><div><span style=\"font-family: HiraKakuProN-W3, sans; font-size: 16.31999969482422px; -webkit-text-size-adjust: 100%;\"><br></span></div><div><font face=\"HiraKakuProN-W3, sans\" size=\"3\"><span style=\"-webkit-text-size-adjust: 100%;\">今は、</span></font><span style=\"font-family: HiraKakuProN-W3, sans; font-size: 16.31999969482422px; -webkit-text-size-adjust: 100%;\">「きぼうの鐘」として</span></div><div><span style=\"font-family: HiraKakuProN-W3, sans; font-size: 16.31999969482422px; -webkit-text-size-adjust: 100%;\">役場敷地内に設置されていました</span></div><div><span style=\"font-family: HiraKakuProN-W3, sans; font-size: 16.31999969482422px; -webkit-text-size-adjust: 100%;\"><br></span></div><div><span style=\"font-family: HiraKakuProN-W3, sans; font-size: 16.31999969482422px; -webkit-text-size-adjust: 100%;\"><br></span></div><div><span style=\"font-family: HiraKakuProN-W3, sans; font-size: 16.31999969482422px; -webkit-text-size-adjust: 100%;\"><br></span></div><div><font face=\"HiraKakuProN-W3, sans\" size=\"3\"><span style=\"-webkit-text-size-adjust: 100%;\">震災以来、何か自分にできることはないかと</span></font></div><div><font face=\"HiraKakuProN-W3, sans\" size=\"3\"><span style=\"-webkit-text-size-adjust: 100%;\">色々な活動に参加してきましたが、</span></font></div><div><font face=\"HiraKakuProN-W3, sans\" size=\"3\"><span style=\"-webkit-text-size-adjust: 100%;\">プライベートで東北に来るのは</span></font></div><div><font face=\"HiraKakuProN-W3, sans\" size=\"3\"><span style=\"-webkit-text-size-adjust: 100%;\">学生ボランティアで訪れた9年ぶりでした</span></font></div><div><font face=\"HiraKakuProN-W3, sans\" size=\"3\"><span style=\"-webkit-text-size-adjust: 100%;\"><br></span></font></div><div><font face=\"HiraKakuProN-W3, sans\" size=\"3\"><span style=\"-webkit-text-size-adjust: 100%;\">ただ、いまだに流された交番などが</span></font></div><div><font face=\"HiraKakuProN-W3, sans\" size=\"3\"><span style=\"-webkit-text-size-adjust: 100%;\">横になったままで、</span></font><span style=\"-webkit-text-size-adjust: 100%; font-family: HiraKakuProN-W3, sans; font-size: medium;\">胸が痛くなりました</span></div><div><font face=\"HiraKakuProN-W3, sans\" size=\"3\"><span style=\"-webkit-text-size-adjust: 100%;\"><br></span></font></div><div><font face=\"HiraKakuProN-W3, sans\" size=\"3\"><span style=\"-webkit-text-size-adjust: 100%;\"><img src=\"img/blog/sayuri.inoue/img/2020/03/11/3215320/0001.jpeg\"><br></span></font></div><div><font face=\"HiraKakuProN-W3, sans\" size=\"3\"><span style=\"-webkit-text-size-adjust: 100%;\"><br></span></font></div><div><font face=\"HiraKakuProN-W3, sans\" size=\"3\"><span style=\"-webkit-text-size-adjust: 100%;\"><br></span></font></div><div><font face=\"HiraKakuProN-W3, sans\" size=\"3\"><span style=\"-webkit-text-size-adjust: 100%;\"><br></span></font></div><div><font face=\"HiraKakuProN-W3, sans\" size=\"3\"><span style=\"-webkit-text-size-adjust: 100%;\">昨年、フラガールという作品を</span></font></div><div><font face=\"HiraKakuProN-W3, sans\" size=\"3\"><span style=\"-webkit-text-size-adjust: 100%;\">やらせて頂いたときに</span></font></div><div><font face=\"HiraKakuProN-W3, sans\" size=\"3\"><span style=\"-webkit-text-size-adjust: 100%;\">東北の方々の強さを感じました</span></font></div><div><font face=\"HiraKakuProN-W3, sans\" size=\"3\"><span style=\"-webkit-text-size-adjust: 100%;\"><br></span></font></div><div><font face=\"HiraKakuProN-W3, sans\" size=\"3\"><span style=\"-webkit-text-size-adjust: 100%;\"><br></span></font></div><div><font face=\"HiraKakuProN-W3, sans\" size=\"3\"><span style=\"-webkit-text-size-adjust: 100%;\">わたしにできることは少ないですが、</span></font></div><div><font face=\"HiraKakuProN-W3, sans\" size=\"3\"><span style=\"-webkit-text-size-adjust: 100%;\">9年前の出来事を忘れぬよう</span></font></div><div><font face=\"HiraKakuProN-W3, sans\" size=\"3\"><span style=\"-webkit-text-size-adjust: 100%;\">毎日を大切に生きたいと思います</span></font></div><div><font face=\"HiraKakuProN-W3, sans\" size=\"3\"><span style=\"-webkit-text-size-adjust: 100%;\"><br></span></font></div><div><font face=\"HiraKakuProN-W3, sans\" size=\"3\"><span style=\"-webkit-text-size-adjust: 100%;\"><br></span></font></div><br class=\"Apple-interchange-newline\" style=\"-webkit-text-size-adjust: auto;\"><meta http-equiv=\"content-type\" content=\"text/html; charset=utf-8\"><div dir=\"ltr\"><div dir=\"ltr\"><div dir=\"ltr\"><meta http-equiv=\"content-type\" content=\"text/html; charset=utf-8\"><div dir=\"ltr\"><div dir=\"ltr\"><div dir=\"ltr\"><br>13日から幕を開けるはずだった、<br>「リトルショップオブホラーズ」が<br>新型コロナウイルスの影響により<br>数公演、中止となってしまいました<br><br>楽しみにして下さっていた皆さまには<br>本当に申し訳ない気持ちでいっぱいです。。<br><br><br>現段階では、なんとか幕が</div><div dir=\"ltr\">開けられるように<br>カンパニー一同、力を尽くして</div><div dir=\"ltr\">がんばっています<br><br>こういうときこそ笑顔になれる作品を、、<br>みんなで困難を乗り越えていきましょうと<br>強い気持ちで、初日の幕開けに</div><divdir=\"ltr\">向かっております<br><br><br><br>卒業発表時、ブログに記載した通り、<br>わたしはこの作品を最後に<br>乃木坂46としての<br>活動を終える予定なので、<br>色々な思いを背負って稽古に挑んで<br>ハードな期間も乗り越えてきたので、<br><br>中止はとっても胸にきますが...<br><br>コロナウイルスが世界的に</divdir=\"ltr\"></div><div dir=\"ltr\"><divdir=\"ltr\">拡大している現状、<br>やはり一番は皆さんの安全。。<br><br><br>どうか皆さんが健康で<br>過ごせますように...<br><br><br>わたしの一生のお願いを使うので！！！<br>神様お願いします！！！<br><br><br><br><br>そして<br>わたくしごとですが<br><br><br>先日発売された、<br><span style=\"font-family: &quot;ヒラギノ角ゴ ProN W3/W6&quot;, Helvetica; font-size: 15px; -webkit-text-size-adjust: 100%; background-color: rgb(255, 255, 255);\">『えんぶ 2020年4月号』にて発表された</span></divdir=\"ltr\"></div><div dir=\"ltr\"><span style=\"font-family: &quot;ヒラギノ角ゴ ProN W3/W6&quot;, Helvetica; font-size: 15px; -webkit-text-size-adjust: 100%; background-color: rgb(255, 255, 255);\">「えんぶチャート2019」</span>作品部門 で</div><divdir=\"ltr\">主演を務めさせて頂いた</divdir=\"ltr\"></div><div dir=\"ltr\">「フラガール -&nbsp;<span style=\"font-family: &quot;ヒラギノ角ゴ ProN W3/W6&quot;, Helvetica; font-size: 15px; -webkit-text-size-adjust: 100%; background-color:rgb(255, 255, 255);\">dance for smile -</span>」が</div><div dir=\"ltr\">なんと6位に入りました！<br><br>毎日毎日、日本中で様々な作品が</div><div dir=\"ltr\">上演されてる中、6位。。！！！？<br><br>驚き！でもとっても有難いです<br><br><br>そして、<br>俳優部門で井上小百合が94位に...<br><br>色んな方々がいる中で名前が</div><div dir=\"ltr\">上がるだけでもうれしいです。</div><div dir=\"ltr\">しかも日本の100位以内、<br>女性アイドルでトップ、、<br>とても光栄...<br><br>でも、正直まだまだだなあと思うこと<br>ばかりだし、実際にそうなので</div><div dir=\"ltr\">もっともっとがんばらなくては。</div><div dir=\"ltr\"><br><br><br>そしてそして、<br>2019年のミュージカルのランキングで<br>「リトルウィメン」が4位に！！<br><br><br>ブロードウェイミュージカルの</div><div dir=\"ltr\">日本での初演キャストに<br>選んで頂けて、本当に光栄でしたし<br><br>ベスという役に出会えたことは<br>宝物のような出来事で<br>この人の強い生き方からは<br>学ぶことが沢山ありました<br><br><br><br>こうやって、死ぬ気でつくりあげてきた<br>ものたちが評価して頂けるということは、<br>本当にうれしい限りで<br>そこに携わってくださった全ての<br>皆さまに、沢山の感謝を</div><div dir=\"ltr\">改めて送りたいです<br><br>有難うございます！！！！！！！<br><br><br><br><br><br>そして、うれしいお知らせです<br><br>わたしが主演した、<br><span style=\"font-family:&quot;ヒラギノ角ゴ ProN W3/W6&quot;, Helvetica; font-size: 15px; -webkit-text-size-adjust: 100%; background-color: rgb(255, 255, 255);\">「フラガール - dance for smile -」の</span></div><div dir=\"ltr\"><spanstyle=\"font-family: &quot;ヒラギノ角ゴ=\"\" pron=\"\" w3=\"\" w6&quot;,=\"\" helvetica;=\"\" font-size:=\"\" 15px;=\"\" -webkit-text-size-adjust:=\"\" 100%;=\"\" background-color:=\"\" rgb(255,=\"\" 255,=\"\" 255);\"=\"\">テレビ放送が<span style=\"font-size: 15px; -webkit-text-size-adjust: 100%; background-color: rgb(255, 255, 255);\">決定しました！</span></spanstyle=\"font-family:></div><div dir=\"ltr\"><span style=\"font-family: &quot;ヒラギノ角ゴ ProN W3/W6&quot;, Helvetica; font-size: 15px; -webkit-text-size-adjust: 100%; background-color: rgb(255, 255, 255);\"><br></span></div><div dir=\"ltr\"><span style=\"font-family: &quot;ヒラギノ角ゴ ProN W3/W6&quot;, Helvetica; font-size: 15px; -webkit-text-size-adjust: 100%; background-color: rgb(255, 255, 255);\"><br></span></div><div dir=\"ltr\"><span style=\"font-family: &quot;ヒラギノ角ゴ ProN W3/W6&quot;, Helvetica; font-size: 15px; -webkit-text-size-adjust: 100%; background-color: rgb(255, 255, 255);\">そして、その放送を記念して、</span></div><div dir=\"ltr\"><span style=\"font-family: &quot;ヒラギノ角ゴ ProN W3/W6&quot;, Helvetica; font-size: 15px; -webkit-text-size-adjust: 100%; background-color: rgb(255, 255, 255);\">特別番組「演じるということ フラガール</span><span style=\"font-family: &quot;ヒラギノ角ゴProN W3/W6&quot;, Helvetica; font-size: 15px; -webkit-text-size-adjust: 100%; background-color: rgb(255, 255, 255);\">編」</span></div><div dir=\"ltr\"><span style=\"font-family: &quot;ヒラギノ角ゴ ProN W3/W6&quot;, Helvetica; font-size: 15px; -webkit-text-size-adjust: 100%; background-color: rgb(255, 255, 255);\">も、オンエアされることになりました！</span></div><div dir=\"ltr\"><span style=\"font-family: &quot;ヒラギノ角ゴ ProN W3/W6&quot;, Helvetica; font-size:15px; -webkit-text-size-adjust: 100%; background-color: rgb(255, 255, 255);\"><br></span></div><div dir=\"ltr\"><span style=\"font-family: &quot;ヒラギノ角ゴ ProN W3/W6&quot;, Helvetica; font-size: 15px; -webkit-text-size-adjust: 100%; background-color: rgb(255, 255, 255);\"><br></span></div><div dir=\"ltr\"><font face=\"ヒラギノ角ゴ ProN W3/W6, Helvetica\"><span style=\"font-size: 15px; -webkit-text-size-adjust: 100%; background-color: rgb(255,255, 255);\">見どころや裏側を、演出の岡村俊一さん</span></font></div><div dir=\"ltr\"><span style=\"caret-color: rgb(60, 64, 67); color: rgb(60, 64, 67); font-family: Roboto, HelveticaNeue, Arial, sans-serif; font-size: 14px; -webkit-tap-highlight-color: rgba(0, 0, 0, 0); background-color: rgb(255, 255, 255);\">谷川洋二郎役の味方良介さんとともに</span></div><div dir=\"ltr\"><font color=\"#3c4043\" face=\"Roboto, HelveticaNeue, Arial, sans-serif\"><span style=\"caret-color: rgb(60, 64, 67); font-size: 14px; -webkit-tap-highlight-color: rgba(0, 0, 0, 0); background-color: rgb(255, 255, 255);\">沢山お話したので、ぜひ見てください！</span></font></div><div dir=\"ltr\"><span style=\"font-family: &quot;ヒラギノ角ゴ ProN W3/W6&quot;, Helvetica; font-size: 15px; -webkit-text-size-adjust: 100%; background-color: rgb(255, 255, 255);\"><br></span></div><div dir=\"ltr\"><span style=\"font-family: &quot;ヒラギノ角ゴ ProN W3/W6&quot;, Helvetica; font-size: 15px; -webkit-text-size-adjust: 100%; background-color: rgb(255, 255, 255);\"><br></span></div><div dir=\"ltr\"><span style=\"font-family: &quot;ヒラギノ角ゴProN W3/W6&quot;, Helvetica; font-size: 15px; -webkit-text-size-adjust: 100%; background-color: rgb(255, 255, 255);\">3月28日(土)午後6時〜TBSチャンネル2</span></div><div dir=\"ltr\"><span style=\"font-family: &quot;ヒラギノ角ゴ ProN W3/W6&quot;, Helvetica;
