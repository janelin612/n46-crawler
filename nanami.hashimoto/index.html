<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>橋本 奈々未 | 乃木坂46卒業メンバーのブログ</title>

  <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
  <script src="../script/vue.min.js"></script>
  <link rel="stylesheet" href="../main.css">
</head>

<body>
  <div id="app">
    <button id="btn-toggle" :class="{'hide':isFold}" @click="onToggle()"><img src="../menu.svg" alt=""></button>
    <div class="member" :class="{'hide':isFold}">
      <img :src="member.image" alt="" class="avatar">
      <div class="name">{{member.name}}</div>
      <div class="name hiragana">{{member.name_hiragana}}</div>

      <ul class="intro">
        <li v-for="item in member.intro">
          <span class="key">{{item.key}}</span>
          <span class="value">{{item.value}}</span>
        </li>
      </ul>

      <ul class="tag">
        <li v-for="item in member.tag">{{item}}</li>
      </ul>
    </div>

    <div class="menu" :class="{'hide':isFold}">
      <div class="loading-spinner" v-if="isLoading">
        <div class="spinner"></div>
      </div>
      <ul>
        <li v-for="(item,index) in list" v-on:click="onListSelected(index)" :class="index==selected?'selected':''">
          <div v-html="item.title"></div>
          <div v-if="item.title.length==0">&nbsp;&nbsp;&nbsp;</div>
          <div class="small-datetime">{{item.datetime}}</div>
        </li>
      </ul>
    </div>

    <div class="main" v-if="currentPost!=null">
      <div class="heading">
        <a class="post-time" :href="currentPost.url" target="_blank">
          <div class="year-month">{{currentPostDate.yearMonth}}</div>
          <span class="date">{{currentPostDate.date}}</span>
          <span class="week">{{currentPostDate.weekday}}</span>
        </a>
        <div class="post-info">
          <div class="author">{{currentPost.author}}</div>
          <div class="title" v-html="currentPost.title"></div>
        </div>
      </div>
      <span class="content" v-html="currentPost.content"></span>
    </div>
  </div>
</body>
<script> const defaultList=[{"datetime":"2017/02/22 22:54","author":"橋本奈々未","title":"今までありがとうございました！","url":"#","content":"<div>&nbsp;</div><div>&nbsp;</div><div>2月20日のライブをもって、わたしの乃木坂46としての時間は終了しました！</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>わたしの思いは番組だったりライブだったり写真集だったりMVだったりラジオだったり、各所に残してきたので、ここではあまり多くは書きません。</div><div>&nbsp;</div><div>皆さんライブはどうでしたか？</div><div>今日はデビュー５周年ですね。おめでとう！</div><div>&nbsp;</div><div>&nbsp;</div><div>写真集はどうでしたか？見てくれましたか？評判とても良いみたいで嬉しい！！</div><div>渋谷TSUTAYAさんにサイン書いてきたよ！みて！笑</div><div>&nbsp;</div><div>&nbsp;</div><div>ないものねだりのMV、良いよね！さいこう！最後にあんなに素敵なMVに映れて幸せ！</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>わたしの、最後に皆さんに届ける声はラジオで、SOLで、ガールズロックスで、になりました！</div><div>&nbsp;</div><div>すごく大事にしていた場所で最後にできるなんて、幸せです！</div><div>&nbsp;</div><div>明日の放送で、乃木坂のわたしの全てが終了します！</div><div>自分へも、皆さんへも、全ての思いは明日のSOLに置いてきました、良かったら、聴いてください。</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>みんな今まで応援してくれて、好きでいてくれて、本当にありがとうございました！！</div><div>&nbsp;</div><div>私は変わります！皆さんもお幸せに過ごしてください！お互い新しい道にキラキラ輝くものがたくさんあることを願って、さようなら！！</div><div>&nbsp;</div><div>橋本奈々未</div>"},{"datetime":"2017/02/16 13:18","author":"橋本奈々未","title":"22時からみんな大丈夫ー？？","url":"#","content":"<div>&nbsp;</div><div>そう、前回の ついさっき手元に届いて最高だった、みんなに早くお届けしたかったものは、ないものねだりのMVのことでした...！！</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>今日22時からSHOWROOMで</div><div>ないものねだりのMV初解禁&amp;写真集の見どころなど、配信します！</div><div>&nbsp;</div><div>&nbsp;</div><div>写真集も昨日わたしの手元に届いた！紙質がわたしのすきなやつ！良き！</div><div>&nbsp;</div><div>等々、いろんな話しますので、</div><div>お時間合う方、また22時に～ヾ(｡･ω･｡)&nbsp;</div>"},{"datetime":"2017/02/13 23:42","author":"橋本奈々未","title":"花束が部屋に溢れてる","url":"#","content":"<div>&nbsp;</div><div>みんなに早くみてほしいものたちがここからドドドドッと出て行く予定で、今日そのうちの１つがついさっき手元に届いたんだけど、</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>もう最高でわたしこれを最後にみんなに届けられるの最高に幸せだなと思い何度見ても泣きそう！</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>わたしを好きでいてくれたみんなとはもう会えない、からより多くのものを最後に感謝の気持ちを込めて届けたい！</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>世の中からは私はすぐに過去になってなかったものになる！もうなりつつある！わたしはそれも望んでる！</div><div>&nbsp;</div><div>&nbsp;</div><div>けど、それと同じように、</div><div>自分を好きでいてくれて、自分を思ってくれている人、思ってくれていた人に最後まで誠実でありたい！</div><div>他にどう思われても、そりゃしんどい時もあるけど、そこが今の私が一番大事にするべき気持ちだと思う！</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>CanCamの表紙を飾れて、渋谷駅がわたしとCanCamの名前が連なっていっぱいになって、</div><div>&nbsp;</div><div>&nbsp;</div><div>昼夜逆転していた中学時代に毎日聴いていたラジオ番組、SOLで私の最後の声を届けることができて、</div><div>&nbsp;</div><div>&nbsp;</div><div>約６年間一緒に歩いて来たメンバーと、何万人の人に見届けてもらいながら歌って踊ってステージを去れます</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>色んなことがあったけど、６年前はこんな大きな終わりを迎える想像はついてなかったよ</div><div>&nbsp;</div><div>この先も想像を超えたいです</div><div>&nbsp;</div><div>&nbsp;</div><div>みんなも、きっと、今は想像がつかないようなこの先を送るんだろうねえ</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>残りの日々をみなさん楽しんでください！</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div>"},{"datetime":"2017/01/31 11:30","author":"橋本奈々未","title":"赤ニット×スキニー","url":"#","content":"<div>&nbsp;</div><div>この前、たまたまさゆりんと服が完全にかぶった！笑</div><div>&nbsp;</div><div><img title=\"null\" src=\"img/0000.jpeg\" tppabs=\"http://img.nogizaka46.com/blog/nanami.hashimoto/img/2017/01/31/2957970/0000.jpeg\"></div><div>&nbsp;</div><div>&nbsp;</div><div>CanCam効果...？笑</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div><img title=\"null\" src=\"img/0001.jpeg\" tppabs=\"http://img.nogizaka46.com/blog/nanami.hashimoto/img/2017/01/31/2957970/0001.jpeg\"></div><div>&nbsp;</div><div>モデルいくちゃん</div><div>（何故乃木坂ジャージなのかは突っ込まない）</div><div>（なんの深い意味もない）</div><div>（私ほぼすっぴん故みんなと写るのに耐えられる顔してなかったためお星様）</div>"},{"datetime":"2017/01/01 08:54","author":"橋本奈々未","title":"1月1日から東京は夏みたいな空です","url":"#","content":"<div>&nbsp;</div><div>明けましておめでとうございます！</div><div>&nbsp;</div><div>&nbsp;</div><div>2016年、泣かずに越せました</div><div>&nbsp;</div><div>&nbsp;</div><div>けど、紅白終わりに楽屋でみんなで手をつないで年越しの瞬間ジャンプするのはこれで最後だと思うと、2017年になった瞬間なんか泣いちゃった笑</div><div>&nbsp;</div><div>&nbsp;</div><div>毎年それが当たり前に過ごしていたからなんの特別感もなく、ああ書類に書く数字が変わる～次は平成何年なの～、くらいだったけど、今年は久々に、年が変わることに特別な意味を感じます。</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>紅白はすごいなー、2016年、たくさんの愛情や思いやりに触れる１年だったと、改めて思わされる１日でした。本当にありがとうございました！</div><div>&nbsp;</div><div>&nbsp;</div><div>2017年も頑張ります。</div><div>最高の23歳の私を見てもらうために、24歳からの私をがんばるために！</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>みんなありがとう！！</div><div>&nbsp;</div>"},{"datetime":"2016/12/19 07:36","author":"橋本奈々未","title":"朝だ","url":"#","content":"<div>&nbsp;</div><div>これが</div><div>&nbsp;</div><div><img title=\"null\" src=\"img/0000-1.jpeg\" tppabs=\"http://img.nogizaka46.com/blog/nanami.hashimoto/img/2016/12/19/0050841/0000.jpeg\">&nbsp;&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>こうなった</div><div>&nbsp;</div><div><img title=\"null\" src=\"img/0001-1.jpeg\" tppabs=\"http://img.nogizaka46.com/blog/nanami.hashimoto/img/2016/12/19/0050841/0001.jpeg\"></div><div>&nbsp;</div><div>&nbsp;</div><div>立ち位置まできれいに一緒、すごい！</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>１枚目はオーディション時</div><div>２枚目は先日のクリスマスライブのThreefold choice</div><div>&nbsp;</div><div>&nbsp;</div><div>３人とも顔が幼い...18歳のとき...わたしの前髪の短さよ</div><div>&nbsp;</div><div>&nbsp;</div><div>５年半</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>昔の携帯のデータフォルダを見てたら、たくさん面白い写真が出てきたよ</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>これはもう何年前なの...</div><div>&nbsp;</div><div>&nbsp;</div><div><img title=\"null\" src=\"img/0002.jpeg\" tppabs=\"http://img.nogizaka46.com/blog/nanami.hashimoto/img/2016/12/19/0050841/0002.jpeg\"></div><div>&nbsp;</div><div>&nbsp;</div><div>高校生の頃入院して、退院した冬の数ヶ月は薬の副作用があったから制服での登校が出来ずにジャージ登校だったんだけど、教室に授業に来る先生に理解を得るために黒板に 異装 橋本 って書いてあったのね</div><div>&nbsp;</div><div>それが語感が良かったのか、みんなが書き足して黒板の隅の私の異装アピールがすごいことになってたとき 笑</div><div>&nbsp;</div><div>異装って仰々しいよね 笑</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>そして左側にあるカレンダーにズームすると</div><div>&nbsp;</div><div><img title=\"null\" src=\"img/0003.jpeg\" tppabs=\"http://img.nogizaka46.com/blog/nanami.hashimoto/img/2016/12/19/0050841/0003.jpeg\"></div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>女子と男子の攻防が繰り広げられていた</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>卒業してから毎年開かれるクラス会の出席率が全国的に見ても上位なんじゃないかってくらい集まりが良くて今も仲の良いクラスです 笑</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>今年の夏の神宮にはクラスの半分近くの人が来てくれた...もうみんな就職してたりまだ学生してたりで全国ちりぢりになってるのに...</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>名古屋に来てくれた人、ありがとうございました！</div><div>昨日の個別握手会は前髪ポンパで出ました。想像以上に好評でびっくりしましたが、写真にするとあまり良くなかったのでまだ載せません 笑</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>そして、一昨日の全握に来てくれた人、</div><div>ミニライブに朝から来てくれた人、寒い中本当にありがとう。</div><div>でも本調子の自分を見せることができなくてごめんなさい。サイリウムを緑にしてくれたり、わたしのうちわやタオルを持ってくれてる人、たくさん見つけたけど、情けなくて目を見れなかったです。でもそれでもわたしを見てくれているファンの人がたくさんいて、それも分かってました。ありがとう。</div><div>&nbsp;</div><div>&nbsp;</div><div>そして握手会を楽しみにしてくれていた方々、直接お会いできなくてごめんなさい。裏で中止の発表を聞いたみんなの えー！っていう声を聞いていて、泣きそうでした、本当にごめんなさい。</div><div>もし他の会場でお会いできるタイミング、機会があれば、そこで是非お会いしましょう。一昨日がっかりさせてしまった人、本当にごめんなさい。どうかあの後の時間が少しでも良いものであってほしいです。</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>全国的に風邪など流行っているようなので、手洗いうがいきっちりして、栄養のあるものをたくさん食べてね。良い年末年始を迎えられますよう。</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div><img title=\"null\" src=\"img/0004.jpeg\" tppabs=\"http://img.nogizaka46.com/blog/nanami.hashimoto/img/2016/12/19/0050841/0004.jpeg\"></div><div>&nbsp;</div><div>キャンキャンの撮影のとき メイク激薄</div><div>&nbsp;</div><div>最近東京は晴れの日が多いね</div><div>&nbsp;</div><div>&nbsp;</div>"}]; </script>
