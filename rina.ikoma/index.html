<script> const defaultList=[{"datetime":"2018/05/06 21:07","author":"生駒里奈","title":"乃木坂46の生駒里奈でした！！","url":"http://blog.nogizaka46.com/rina.ikoma/2018/05/044787.php","content":"今日で<br>\n<br>\n私は乃木坂46を卒業します！<br>\n<br>\n15歳で受けたオーディション<br>\n<br>\n16歳でデビューして<br>\n<br>\n今は22歳<br>\n<br>\n大人になりました(*´꒳`*)<br>\n<br>\n<br>\n<br>\n<br>\n乃木坂46が私に与えたものはものすごーくステキな物ばかりです。<br>\n<br>\n<br>\n嬉しいも楽しいも苦しいも悔しいも<br>\n<br>\nどれもこれも輝いています。<br>\n<br>\n<br>\n今の私を作ったのは私自身でもありますが、<br>\n<br>\nスタッフさん、お仕事でお世話になった方々、<br>\n<br>\nメンバー、ファンの皆さん<br>\n<br>\n一人一人の言葉や想いが私を動かしてくれました。<br>\n<br>\n<br>\n本当にありがとうございました！！！<br>\n<br>\n一生物の財産です<br>\n<br>\n私のチカラです。<br>\n<br>\n私は、<br>\n<br>\n乃木坂46になれてよかったです。<br>\n<br>\n乃木坂46の生駒ちゃんと呼ばれた日々が宝物です。<br>\n<br>\n<br>\nあーー！！！！<br>\n<br>\nたった人生22年<br>\n<br>\nたった芸歴7年目<br>\n<br>\n<br>\nそんな人間がこんなに清々しい感情を抱けるのか<br>\n<br>\nすごい事だよね<br>\n<br>\n<br>\n贅沢なことです<br>\n<br>\n<br>\nそれだけずっとずっと乃木坂にかけていた。<br>\n<br>\n乃木坂46を頑張れていたんだ。<br>\n<br>\n<br>\n乃木坂を良くしたいと泣いた日々が懐かしいです。<br>\n<br>\n青春とよく言いますが、<br>\n<br>\n私にとって乃木坂46は相棒です。<br>\n<br>\n苦楽を共にずっとしてきました。<br>\n<br>\n起きても寝ててもオフの日に買い物してても<br>\n<br>\nずっと乃木坂46を考えて過ごしてきました。<br>\n<br>\nお陰で、私色んなこと出来るようになったよ。<br>\n<br>\nありがとう。<br>\n<br>\n<br>\n<br>\nこれからは、自分の事を考えて行きます。<br>\n<br>\n<br>\nお仕事も、プライベートも<br>\n<br>\n青春させてーーー笑笑☆☆（楽しく過ごすお♪）<br>\n<br>\nですが、<br>\n<br>\nファンの皆さんには<br>\n<br>\n芸能人の生駒ちゃんがやる作品だったり、テレビだったり<br>\n<br>\n目にした時に必ず楽しいと思わせますから、<br>\n<br>\nそこは楽しみにしていて下さいね<br>\n<br>\nそして、変わらず応援して下さったら嬉しいです(*´꒳`*)<br>\n<br>\n<br>\n<br>\n<br>\nでもね、<br>\n<br>\n<br>\n乃木坂46をずっとずっと好きでいて欲しいです(*´꒳`*)<br>\n<br>\n<br>\n私が大好きな乃木坂46をこれからも支えて下さったら嬉しいです(*´꒳`*)！！！<br>\n<br>\n生駒ちゃんもずっと大好きだし、<br>\n<br>\n私の活動が未来の乃木坂に繋がるようにするのも私の役目だと思います。<br>\n<br>\n頑張りますね！！<br>\n<br>\n<br>\n改めて、<br>\n<br>\n私を支えて下さった皆さん本当にありがとうございました。<br>\n<br>\nやりきりました。<br>\n<br>\n乃木坂46<br>\n<br>\n楽しかったです！！<br>\n<br>\nこれからもよろしくお願いします(*´꒳`*)！！<br>\n<br>\n期待していて下さい。<br>\n<br>\nではっ<br>\n<br><img alt=\"A1C73B18-70DC-42AE-A35F-3EE314A35E99.jpeg\" src=\"img/blog/rina.ikoma/img/2018/05/06/A1C73B18-70DC-42AE-A35F-3EE314A35E99.jpeg\" width=\"2068\" class=\"mt-image-none\" style=\"\">\nへばなっ★彡<br>\n\n"},{"datetime":"2018/05/05 19:21","author":"生駒里奈","title":"今日アイスたべる","url":"http://blog.nogizaka46.com/rina.ikoma/2018/05/044765.php","content":"<p>さゆりすとが出演している<br><br>舞台<br><br>若様組まいる〜 アイスクリン強し<br><br>を観劇してきました(*´꒳`*)</p>\n<p></p>\n<p><img alt=\"7907139794304.jpg\" src=\"img/blog/rina.ikoma/img/2018/05/05/7907139794304.jpg\" width=\"1478\" class=\"mt-image-none\"></p>\n<p><br><br>モマで共演しました</p>\n<p><br>鎌苅健太さん<br>中村優一さん<br>とさゆりすと<br><br>少年社中のふみこさんが生駒卒コンTシャツをモマメンバーに配ってるんだって！！<br><br>本当にありがとうございます！！☆☆<br><br>（いいもん作ったかもしれない笑笑）<br><br>嬉しいし<br><br>だけど、今日お二人とも着てるし<br><br>なんだか、照れたけど嬉しかった(*´꒳`*)<br><br>またお二人と共演出来るように明後日から頑張らなきゃと思いました。<br><br><br>さゆりすと頑張ってね(*´꒳`*)☆<br><br>会えて良かった〜！！！<br><br>あやねちゃんのはまた後で行くよう<br><br><br>メンバーが出ている舞台沢山あるから観劇沢山出来るの超嬉しい(*´꒳`*)<br><br><br><br>明日で乃木坂最後だと言うのに、<br><br>私は至っていつも通りです<br><br>時間があるから、<br><br>浴室のカビ防止の散布して、<br><br>掃除機かけて<br><br>断捨離して<br><br>お散歩がてら服買って<br><br>自炊のレパートリー増やしてみてます！<br><br><br>楽しいよ〜笑<br><br><br><br>明日、乃木坂楽しみます！！<br><br>へばなっ★彡</p>"},{"datetime":"2018/04/27 13:13","author":"生駒里奈","title":"アイドルとしての表現は出し切りました。","url":"http://blog.nogizaka46.com/rina.ikoma/2018/04/044615.php","content":"生駒です<br>\n<br>\n卒業ライブが終わり数日経ちました。<br>\n<br>\n一番に思うのは、<br>\n<br>\nあぁ<br>\n<br>\n結局歌は上手くならなかったなぁです。<br>\n<br>\nまぁ、こんな生駒にソロパートなんて任せられないし。<br>\n<br>\nでもでも、もう少し上手くなりたかったなぁ。<br>\n<br>\n<br>\n<br>\nてか、私は歌上達出来る人なのかなぁ。<br>\n<br>\n音痴だからな、<br>\n<br>\n<br>\n水玉模様<br>\n<br>\n一回も上手に歌えなくてごめんね。<br>\n<br>\nそれだけが悔やまれます。<br>\n<br>\n<br>\n<br>\nただ、<br>\n<br>\nライブはすごーくすごーく楽しかった(*´꒳`*)<br>\n<br>\n<br>\nだって皆んなといっぱいパフォーマンス出来たし！！<br>\n<br>\nナルトが出てきたし！！<br>\n<br>\nてか！<br>\n<br>\n<br>\n岸本斉史先生からイラスト頂いた(´；ω；｀)☆<br>\n<br>\n<br>\nこんな事起こっていい事なの⁈<br>\n<br>\nナルトくんがコメントくれた(´；ω；｀)☆<br>\n<br>\n<br>\nいいのかなぁ。。。<br>\n<br>\n1ファンだよ。。。。<br>\n<br>\nただのファンだよ。。。。<br>\n<br>\n<br>\n。。。。こんな贅沢はもうないんだからな生駒、<br>\n<br>\nこれからの修行、絶対投げ出すなよ！！<br>\n<br>\n<br>\n改めて、<br>\n<br>\n仲間がいて、自分の名前がライブのタイトルに付いていて、<br>\n<br>\n歴史ある建物でライブが出来る<br>\n<br>\n<br>\nこんな事やらせていただけた事、本当に感謝しています。<br>\n<br>\n<br>\n<br>\n生生星と言ってファンの皆さんに好きだといってくださっています。<br>\n<br>\n実はね、そこに私がいるのがすごく怖かったんだ、<br>\n<br>\n初期はね、私が真ん中にいたら2人も悪く言われちゃうって思ってて、<br>\n<br>\n私なんか消えて、2人を見てっ！！<br>\n<br>\n<br>\nってずっと思ってたなぁ。。笑<br>\n<br>\nとんだ厨二病野郎だな☆<br>\n<br>\nでもその時は本気で思ってたんだよ笑<br>\n<br>\n<br>\nそんな事思い出しながら最後に歌いました<br>\n<br>\n<br>\nみなみといくちゃんはずっと歌が上手いなぁってアイコンタクトしたよ☆<br>\n<br>\n<br>\n満月が消えたも三人揃って出来て満足(*´꒳`*)<br>\n<br>\n<br>\nこん時、マイクが唇に当たって唇の真ん中に血豆が出来たのは面白かった！<br>\n<br>\nオーディションの時からお世話になっているメイクさんが、生駒何口につけてるんだってびっくりしたってごめんぬ！笑<br>\n<br>\n<br>\nシンクロニシティのお客様の前で披露するのは初めてだったし<br>\n<br>\n今回、期生ごとに曲を頂いたので披露したかったし、<br>\n<br>\nAKB48との兼任は私は忘れて欲しくなかったから、<br>\n<br>\n大好きな三曲を披露しました。<br>\n<br>\n<br>\n<br>\n<br>\nそれぞれ、一期生と最後に踊れて、<br>\n<br>\n二期生、三期生とも一緒に踊れて嬉しかった(*´꒳`*)<br>\n<br>\n<br>\n絢音ちゃんと、秋田の皆さんも観ている中ユニット出来て超嬉しかった～～♡♡<br>\n<br>\n<br>\nサプライズで、メンバーにバラの花を一輪ずつ貰い、ライブTシャツの背中に一文字づつ字が書いてあって、<br>\n<br>\nくるくる回るメンバーが可愛くて、でも嬉しくて<br>\n<br>\n皆んなほんとに時間がない中準備してくれたんだって<br>\n<br>\n私の為に時間を使ってくれてありがとうございました(´；ω；｀)！！<br>\n<br>\n<br>\n私はほんとに幸せです。<br>\n<br>\n<br>\nあとね、沢山の方々からメッセージを頂きました。<br>\n<br>\nバナナマンさん、まゆゆさん、スタッフの皆さん、メンバー、ファンの皆さん、<br>\n<br>\nお父さん、お母さん。<br>\n<br>\n今までテレビ、映画や舞台を通してお世話になった皆さん。<br>\n<br>\n中にはね、写真付きでメッセージ下さった方々も居るんだよ(*´꒳`*)<br>\n<br>\n<br>\n私には勿体ない言葉ばかり。<br>\n<br>\n私、そんな人間じゃないよ。<br>\n<br>\nありがとうって言われる人じゃないよ。<br>\n<br>\n皆さんにこそありがとうをあげたいよ！！！<br>\n<br>\n<br>\n<br>\n<br>\n<img alt=\"69FCBF39-A802-4AA0-86C5-652CD30645EE.jpeg\" src=\"img/blog/rina.ikoma/img/2018/04/27/69FCBF39-A802-4AA0-86C5-652CD30645EE.jpeg\" width=\"1568\" class=\"mt-image-none\" style=\"\">\nまだ、卒業じゃないからまとまらない！！<br>\n<br>\nただ、最高に楽しいライブでした！<br>\n<br>\n5月6日までは乃木坂46なので、<br>\n<br>\n最後までよろしくお願いします！！<br>\n<br>\nへばなっ★彡<br>\n\n\n\n\n\n\n\n\n\n\n\n"},{"datetime":"2018/04/24 10:19","author":"生駒里奈","title":"取り急ぎね！","url":"http://blog.nogizaka46.com/rina.ikoma/2018/04/044571.php","content":"<br>\n生駒里奈卒業コンサート終わりました！！<br>\n<br>\nご来場いただき誠にありがとうございました！！<br>\n<br>\n<br>\n<img alt=\"07FBF5E5-C326-453A-B6A7-A9B9F51F809E.jpeg\" src=\"img/blog/rina.ikoma/img/2018/04/24/07FBF5E5-C326-453A-B6A7-A9B9F51F809E.jpeg\" width=\"1478\" class=\"mt-image-none\" style=\"\"><br>\n<br>\nかわいいね！<br>\n<br>\nへばなっ★彡<br>"},{"datetime":"2018/04/21 22:35","author":"生駒里奈","title":"4/22","url":"http://blog.nogizaka46.com/rina.ikoma/2018/04/044557.php","content":"<br>\n生駒ちゃんの卒業コンサートです<br>\n<br>\n<br>\n色々な事考えてました。<br>\n<br>\nここ一週間は寝ようとすると色んな事を考えていて<br>\n<br>\n頭痛で寝れなくて笑<br>\n<br>\n<br>\nメンバー、スタッフさんの想いはしっかり受け止めています。<br>\n<br>\nありがとう。<br>\n<br>\n私はいつも通りの最高のライブをしようと思っています。<br>\n<br>\nライブに来られる方、ライブビューイング含め<br>\n<br>\n超楽しい時間にしましょうね！！<br>\n<br>\n<img alt=\"99B38948-7264-46EF-BD2B-17C3153E22BF.jpeg\" src=\"img/blog/rina.ikoma/img/2018/04/21/99B38948-7264-46EF-BD2B-17C3153E22BF.jpeg\" width=\"1478\" class=\"mt-image-none\" style=\"\">\n<br>\n<br>\n瞬き厳禁だよ☆<br>\n<br>\nへばなっ★彡<br>"},{"datetime":"2018/04/13 10:30","author":"生駒里奈","title":"立ち向かうんだ","url":"http://blog.nogizaka46.com/rina.ikoma/2018/04/044425.php","content":"<br>\nAgainst<br>\n<br>\nMVが公開されましたね。<br>\n<br>\n一期生で歌わせてもらいました！！<br>\n<br>\n<br>\nそして生駒ちゃんセンターの<br>\n<br>\nいくちゃんとみなみちゃんのフロント<br>\n<br>\n生生星ですね(*´꒳`*)<br>\n<br>\nあの頃はそんなに意識して居なかったけど、<br>\n<br>\nいつの日からか、ファンの皆さんからこの三人の形を好きだと言って下さいました。<br>\n<br>\n<br>\n<br>\nラストという事で、<br>\n<br>\n私なりに沢山考えて、スタッフさんと考えて<br>\n<br>\nAgainstは<br>\n<br>\n生駒のやりたい事をアイデアとして使って頂く事になりました。<br>\n<br>\n<br>\nこの一期生だから、この仲間だからやりたいし、<br>\n<br>\n挑戦したい事<br>\n<br>\nずっと頭の中でいつ形に出来るかとチャンスを伺っていて<br>\n<br>\n今だ！！！<br>\n<br>\nと今しか出来ないと行動に移しました！！<br>\n<br>\n<br>\nこの曲は私にとっては挑戦で、<br>\n<br>\n私はこの7年間でどれだけの事が身についたのか<br>\n<br>\nそして自分の中にあるこれはなんだろう...<br>\n<br>\n形にしたい！！<br>\n<br>\nというワクワクキラキラを現実にする為に<br>\n<br>\n乃木坂との出会いは失いたくないからで、<br>\n<br>\n水玉模様を撮って下さった丸山健志監督にお願い出来ますかと声をかけ、<br>\n<br>\nダンスは様々踊ってきて学んだ事をと、<br>\n自分もやった事のないジャンルを踊りたかったので<br>\n<br>\n舞台 こちら葛飾区亀有公園前派出所 で共演しました福澤侑さんにお願いしました。<br>\n<br>\n<br>\n<br>\n<br>\n<br>\n<br>\n乃木坂46が教えてくれた様々な表現を<br>\n<br>\nここに一つにまとめたらどうなるだろう<br>\n<br>\nその一人の人間の為に<br>\n<br>\n実際に動いて下さった皆様に感謝しています。<br>\n<br>\n<br>\n<br>\n完成したMVは私が観たかったものでした！<br>\n<br>\n色んな意見があると思いますがそこは最後のご愛嬌という事で〜〜(*´꒳`*)<br>\n<br>\n挑戦と一番安心する心強い一期生と作品を作る。<br>\n<br>\nみんなも大変な撮影の中最高の物を出してくれました。<br>\n<br>\n本当に感謝しています。<br>\n<br>\n<br>\nまだ見たことない面があるのか。。。<br>\n<br>\n凄いよ〜(´；ω；｀)☆☆☆<br>\n<br>\n<br>\n<br>\nあ、生駒が全てアイデア出した訳ではございませぬのでね！！<br>\n<br>\n<br>\n皆さんにはどう映ったのだろうか、、、<br>\n<br>\n観たかったものではない方も、逆にキタコレって思って下さった方も。。。<br>\n<br>\n<br>\n<br>\nシンクロニシティでも、私はとても自由に舞っていました。<br>\n<br>\n振り付けはインフルエンサーでもお世話になったSeishiroさん<br>\n<br>\nいつかSeishiroさんの作品でもっともっと舞ってみたいのが私の目標(*´꒳`*)<br>\n<br>\n<br>\n<br>\n監督は<br>\n<br>\n私を作った<br>\n<br>\nと言ってもいいですか？<br>\n<br>\n制服のマネキンの池田一真さん<br>\n<br>\n最後にまた撮って頂けて光栄です。<br>\n<br>\nきっと今後も私には制服のマネキンが生き続けると思うから。<br>\n<br>\nあんなに綺麗に写ってて少しびっくりしましたし、<br>\n<br>\n何よりも私は、<br>\n<br>\nシンクロニシティを見て<br>\n<br>\nあぁ。。<br>\n<br>\n乃木坂だと<br>\n<br>\n一人で映像を観ながら震えてました。<br>\n<br>\nこれは凄いぞっ！！！！<br>\n<br>\nまさにキタコレッッ！！！！<br>\n<br>\n皆さんもそう思った方いるはずです(*´꒳`*)(*´꒳`*)<br>\n<br>\nメンバーが魅せる優しさや切なさ。<br>\n<br>\n儚いその指先から放出されるエネルギー<br>\n<br>\nシンプルなワンピースに隠された可愛さ。<br>\n<br>\n<br>\nいやはや〜<br>\n<br>\nまた乃木坂で素敵な景色を見る事が出来ました。<br>\n<br>\nそして乃木坂を通して素晴らしい才能に触れる事が出来ました<br>\n<br>\nこんな贅沢な時間を過ごしてきたんだなぁ<br>\n<br>\nもっとうまくならなきゃバチが当たるなぁ<br>\n<br>\n<br>\n<br>\n<br>\nさ！！<br>\n<br>\n皆さま、発売まで気持ちを高めながら待っていてくださいね☆☆☆<br>\n<br>\n<br>\n<br>\n<br>\nそして、<br>\n<br>\n皆さんにお知らせがあります。<br>\n<br>\n私、生駒里奈の<br>\n<br>\n乃木坂46として送る最後の時間をお知らせしたいと思います。<br>\n<br>\n<br>\nそれは、5月6日の幕張メッセ<br>\n<br>\nシンクロニシティの全国握手会です。<br>\n<br>\nぜひ、パフォーマンスを観に来てください。<br>\n<br>\n生駒ちゃんに会いに来てください。<br>\n<br>\n心よりお待ちしております(*´꒳`*)<br>\n<br>\nではっ<br>\n<br>\nへばなっ★彡<br>"}]; </script>
