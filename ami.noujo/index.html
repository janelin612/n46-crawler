IYE3YJFbznIC1akLGPgunDMVkVTYIIMfcOYTv0GcQRuOxDa25eGeAg2rKZl2bSLAS9lsvTzFV8SXodvy5aDokiosjU9iq7bsPTUZFHBSw4v6oi1i7unCR92YqFKm5RHp5Rdg94JtruVyKiIOfQ5BOJTQOgu0zyvJJosDO\"><img src=\"img/blog/ami.noujo/img/2018/10/28/5734759/0003.jpeg\"></a></div><div>&nbsp;</div><div>あみポタです。</div><div>&nbsp;</div><div>&nbsp;</div><div>ファンの方に有無も言わさず呪文かけまくったら みんなどういう反応したらいいのかわからなかったみたいですごく困惑してた。笑笑</div><div>でもその姿が愛おしくて 構わず石になる呪文とかとなえまくった。</div><div>ひたすら無邪気なあみポタです。お許しください</div><div>&nbsp;</div><div>あみがどんなに自由な握手をしてもそれでも好きだよと言ってくださるまるで神様のようなあみのファンのみんな。</div><div>泣きながらあみに、アイドルになってくれてありがとうって言ってくれるんだ</div><div>嬉しすぎるし、こちらが泣いてしまうそんなの。</div><div>&nbsp;</div><div>本当に、本当に、大切です。</div><div>あみに出会ってくれてありがとうと</div><div>心から全員一人一人に言いたいです。</div><div>&nbsp;</div><div>&nbsp;</div><div><a href=\"http://dcimg.awalker.jp/view/a0skRgsPSmEFaEfjJpC8bQYbwUYiKESn3l7pYA78jfFY0N9V2gPClzRiTmYBqDFFxUmTqxdzJ390DbAcrJXNQHLn2rO1xTD7qryyyUfjOONsFiyELpRhk4YqYxBnVpYwq1LLDDEKSjoYVqcJZX8r137ONJoAkVsrI3onLUGaE9bOQnGHKgNZO79nx0ntyN9ZzQzs1soe\"><img src=\"img/blog/ami.noujo/img/2018/10/28/5734759/0004.jpeg\"></a></div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div></body></html> "},{"datetime":"2018/10/18 09:48","author":"能條愛未","title":"２４歳になっちゃった♪♪","url":"http://blog.nogizaka46.com/ami.noujo/2018/10/047405.php","content":"<html><head><meta http-equiv=\"Content-Type\" content=\"text/html; charset=UTF-8\"></head><body><div>タイトルはあえてポップな感じにしました</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div>本日１０月１８日<div>&nbsp;</div><div>２４歳になりました！</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>やばいですもうどんどん本気の大人になっていく。</div><div>&nbsp;</div><div>本気の大人ってのがいったいいくつなのかは私にもわからないけど なんか本気の大人に近づいてる気がします</div><div>&nbsp;</div><div>&nbsp;</div><div>しっかり地に足つけて、</div><div>強い意志を持って、</div><div>２４歳という年を生きたい。</div><div>&nbsp;</div><div>&nbsp;</div><div><a href=\"http://dcimg.awalker.jp/view/fPekqXVQlsf5Gc8x8KgOtQkLUoCyeYEnot1oXoisG7bDmzzhJ3Onn5rHvRc9YXKh92bSRwT9FitCtd2GJhg4I5Xi537DXUNlGzqR5ctwxNFN5ql9WstbSMZHzTICOE2zb2vrqU2tel1M8xkOiCRwXx9kXlQwQDAqN1Uvs36wlcmPPUuamHI9OlGjKrhG2OTZd7ZVCEhU\"><img src=\"img/blog/ami.noujo/img/2018/10/18/2350196/0000.jpeg\"></a></div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div></body></html> "},{"datetime":"2018/10/05 22:00","author":"能條愛未","title":"皆様へ。","url":"http://blog.nogizaka46.com/ami.noujo/2018/10/047263.php","content":"<p><meta http-equiv=\"Content-Type\" content=\"text/html; charset=UTF-8\"></p>\n<div> </div>\n<div> </div>\n<div>前向きな一歩です。</div>\n<div>人生の中で最も そしてはじめて、自分で大きな決断をしたと思っています。</div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div>わたくし能條愛未は、</div>\n<div>乃木坂46を卒業します。</div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div>この決断をしたのは 一年半前の全国ツアー中の時です。</div>\n<div>自分なかの直感みたいなもので 次へ進もうという気持ちがふと湧いてきました</div>\n<div>きっと私がこういう気持ちになったということは ここで自分がやれる事はやりきったと思えたし、悔いがないと思えた</div>\n<div>あとは 目標や将来のビジョンが明確になったから。</div>\n<div> </div>\n<div> </div>\n<div>この場所で出会えた全ての人に心から感謝の気持ちでいっぱいなんです！！</div>\n<div> </div>\n<div>こんな私を最後まで支え続けてくれたスタッフの皆様</div>\n<div> </div>\n<div>いろんな壁を乗り越えて汗と涙を一緒に流して 確かな心の繋がりを感じさせてくれた大好きな同期の皆</div>\n<div> </div>\n<div>最初は怖がられてたけどなんとかちゃんと仲良くなれたし。笑 ほぼ同期かな思うくらい大好きな二期生の皆</div>\n<div> </div>\n<div>そしてがむしゃらで何事にも全力で取り組む 乃木坂の明るい未来を作っていってほしい三期生の皆</div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div>そしてそして </div>\n<div>こんなアイドルなのかなんなのかというキャラなのにも関わらず、</div>\n<div>背中を押し続けて 光を照らし続けて 私がアイドルになった意味を教えてくれたファンの皆様。</div>\n<div> </div>\n<div>全ての皆様のおかげで私はここまでやってくることが出来ました。</div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div>卒業してからも芸能界には残ります。</div>\n<div>ここからが私にとっての新たなスタートとなります。</div>\n<div> </div>\n<div>自分の足でしっかり前へ進み</div>\n<div>立派に1人で戦っていきたい</div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div>１２月１５日の個別握手会がおそらく最後になると思います。</div>\n<div> </div>\n<div>その日までは普通にブログも更新しますしモバメもたくさん送りますし755も更新したいと思ってるので</div>\n<div> </div>\n<div>最後の日まで</div>\n<div>よろしくお願い致します。</div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>"},{"datetime":"2018/07/25 16:30","author":"能條愛未","title":"ラヴ戦争千秋楽。と、お知らせ(^^)","url":"http://blog.nogizaka46.com/ami.noujo/2018/07/046184.php","content":"<html><head><meta http-equiv=\"Content-Type\" content=\"text/html; charset=UTF-8\"></head><body>あっという間に終わってしまいました。<div>&nbsp;</div><div>&nbsp;</div><div>去年に引き続き二度目の参加となりましたホリケン演劇の会。</div><div>&nbsp;</div><div>&nbsp;</div><div>去年以上に個性豊かなメンバーに囲まれて</div><div>最高に楽しい1ヶ月でした！</div><div>こんなにも自由で、毎回の稽古で一回は必ずお腹を抱えて爆笑する そんな和気藹々としたカンパニーなかなかないと思います！！</div><div>&nbsp;</div><div><a href=\"http://dcimg.awalker.jp/img1.php?id=vRejFgovuxi7Hhs0av5u1PfEY5uCJAcPOdwPWAD5szk4VJhTbOBHJyk19NyYt1K8nZy6sphYtwWBlca0UouVnAbKT7x1VkonZdPXhHs1gaNJMDXctIVXozg3bTnhqkVcoxjGNHJ4GbJWIqayZmuETvTag2z8uLW0bOIvTNn9SH3M8YZFJKzrAOxstambGvhIGIu4nL56\"><img src=\"img/blog/ami.noujo/img/2018/07/25/9737411/0000.jpeg\"></a></div><div>&nbsp;</div><div>出川さんもホリケンさんもパパみたいに優しくてだいすき(^^)</div><div>毎回これでもかと笑いが起こる公演なのに、</div><div>まだ足りない、まだ足りないと言うんです。</div><div>笑いへの追求心がものすごくて、芸人魂を感じました。</div><div>&nbsp;</div><div><a href=\"http://dcimg.awalker.jp/img1.php?id=qmXTRx3vs6jTcXnae099DZOoNO9DrQxwpWnFndFbVdFoDCOSKPzPUAkbk3AqGxzEBUGKhrtOPzsRgWtv5ZxjPJVHjubY25g9K5LyhjoldpGiIKh297bfPliGd5R87Ixl3mUni4fljBiQdNn9sdFNvwKJ4jJfVMEzau2KBpIBFTTwHOZPy4Bsi0g6zxOWyssQNShm2iVR\"><img src=\"img/blog/ami.noujo/img/2018/07/25/9737411/0001.jpeg\"></a></div><div>&nbsp;</div><div>コージさんダイキさん</div><div>ブルゾンさん風に間にいれていただきました。</div><div>ダイキさん後光が差してます。</div><div>&nbsp;</div><div>&nbsp;</div><div><a href=\"http://dcimg.awalker.jp/img1.php?id=oJ3Cs5CxTz2uzR3RIn8IvO0Qyslv1jd1BjYB0WEuweLKyiaxbMVaAooyhi80RNOrWxWI14yEVHtJz1mAfZmay1CrhjDwT1F2OUPMN6GnAkJ3N6LGN9I2VEF6Bl3Y0LpyAtyWmPHIQ3EipIZeF8uOIZUUzUqt7VQxyJtaCqZo8M63RKmHpqyvJrx3GJCQ8I4gkyaB1JFb\"><img src=\"img/blog/ami.noujo/img/2018/07/25/9737411/0002.jpeg\"></a></div><div>&nbsp;</div><div>修子さん、真飛さん</div><div>この個性的な３人楽屋 最高に楽しかった。笑</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div><a href=\"http://dcimg.awalker.jp/img1.php?id=CloyK8e3wu1TU3lgN4LPktcvUBuuGUDLg4ALMVPrF5waFygY2fFM4nAVO5XB6PPEl3T93ksDbCPsJJkM99sLIgkM4ZfbthhNySdy0XoUUrR7wy0NJVQ6fjBziulUYZg6ISBvn1yZeY7CZUeBCKykZK4hveodqW2UFodJjhyMBEu5VQTTvkXq3E0QUoILevzaCDQjTBLm\"><img src=\"img/blog/ami.noujo/img/2018/07/25/9737411/0003.jpeg\"></a></div><div>出川婆ちゃん</div><div>&nbsp;</div><div><a href=\"http://dcimg.awalker.jp/img1.php?id=WPDbiP2jCn6YtHlEN1Jlyui7QxolRsrqIuQX4gRLTXFWwQ5rfPFR5wCNqt5fJNTRwBrNB0eaMxcRJlFcUWjnmqGGKA1KbcZ4GHMvibLjpmBLAAxDArawXIA4MOErWtRtlnkjnRX3vyQYcEZ0gPWbmRimINevLbejc8BfQ6GXs9i2NHx0t7bc6yiio4gtYU8hyHwqPlCi\"><img src=\"img/blog/ami.noujo/img/2018/07/25/9737411/0004.jpeg\"></a></div><div>&nbsp;</div><div>木原ソラ子ちゃん。</div><div>ありがとう^_^</div><div>&nbsp;</div><div>今回観れなかったという方、</div><div>ラヴ戦争DVDになるみたいなので</div><div>ぜひ！ぜひ！お早めに予約を！！</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>〜おーしーらーせ〜</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>２月に私が主演を務めさせて頂いた、</div><div>ミュージカル「少女革命ウテナ〜白き薔薇のつぼみ〜」Blu-ray &amp; DVD発売リリースイベントを開催します！</div><div>&nbsp;</div><div>日程は、2018.10.14 （日）</div><div>&nbsp;</div><div>メンバーは、</div><div>能條愛未／山内優花／立道梨緒奈／鈴木亜里紗／竹内夢</div><div>&nbsp;</div><div>会場はまだ決まってないのですが、</div><div>皆様是非いらしてくださいっ</div><div>&nbsp;</div><div>世界を革命する力を！</div><div>&nbsp;</div></body></html> "}]; </script>
