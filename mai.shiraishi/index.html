<script> const defaultList=[{"datetime":"2020/07/04 21:00","author":"白石麻衣","title":"チョキ。","url":"http://blog.nogizaka46.com/mai.shiraishi/2020/07/056939.php","content":"<p><meta http-equiv=\"Content-Type\" content=\"text/html; charset=UTF-8\"></p>\n<div>お久しぶりです^ ^</div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div>実は一ヶ月ほど前に髪の毛切りました</div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div><img src=\"img/blog/mai.shiraishi/img/2020/07/04/6244385/0000.jpeg\"></div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div>20センチくらい！ </div>\n<div>（マネージャーさんに連写してもらった中の一枚です。）</div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div>乃木坂入って初めての長さです</div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div>シャンプーが楽です</div>\n<div> </div>\n<div>ドライヤーも楽です</div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div><img src=\"img/blog/mai.shiraishi/img/2020/07/04/6244385/0001.jpeg\"></div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div>とても楽ちんです、、</div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div>スタイリングもロングの時と全然違うので楽しいよ！</div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div>一回短くしたら、もう少しいけるもう少しいける、、ってどんどん短くなりそうです。</div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div>とりあえず、</div>\n<div> </div>\n<div>髪の毛切ったよの報告ブログでした</div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div>みんな体調には気を付けてね</div>\n<div> </div>\n<div>ご飯いっぱい食べるんだよ^ ^</div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div><img src=\"img/blog/mai.shiraishi/img/2020/07/04/6244385/0002.jpeg\"></div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>"},{"datetime":"2020/04/28 20:00","author":"白石麻衣","title":"皆さん。","url":"http://blog.nogizaka46.com/mai.shiraishi/2020/04/056035.php","content":"<html><head><meta http-equiv=\"Content-Type\" content=\"text/html; charset=UTF-8\"></head><body><div><div>こんばんは</div><div>&nbsp;</div><div>&nbsp;</div><div>皆さん元気にしていますでしょうか？</div><div>私は変わらず元気です^ ^</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>今日は一つ、皆さんにお伝えすることがありブログを書きました。</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>本来であれば、5月5日、6日、7日で計画をしていました東京ドームでのライブをもって乃木坂46を卒業する予定でしたが、新型コロナウイルスの影響で開催が難しくなってしまいました。</div><div>ライブの日程も早く皆さんにお伝えしたかったのですが、今のこの状況の為、結果的には最後までライブの開催を発表することができませんでした。</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>ですが、</div><div>&nbsp;</div><div>皆さんには直接、今までの感謝の気持ちを伝えたいなと思っております。卒業ライブはみなさんが安全に楽しんでいただける状況ができたら、改めて行いたいと思っているので、会場と時期が決まりましたらお伝えしたいと思います。</div><div>&nbsp;</div><div>&nbsp;</div><div>今後の活動に関しては、ソロ活動が多くなっていくと思いますが、スタッフの皆さんと相談しながら、グループの一員として参加出来ることは頑張っていきたいので、温かく見守って頂けたら嬉しいです。</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>卒業ライブを開催できる日までは乃木坂46に在籍になります。状況次第でまた色々変わってくるかもしれませんが...</div><div>今のところ今後の活動はこのような感じになります。</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>毎日大変かと思いますが、ここを一緒に乗り越えて頑張りましょうね！</div><div>私も一日一日を大切に過ごして行きたいと思います。</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>早くたくさんの方が元気になりますように、笑顔で過ごせますように。私も精一杯のパワーを届けられるようこれからも頑張ります^ ^</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>白石麻衣</div></div></body></html> "},{"datetime":"2020/01/07 08:48","author":"白石麻衣","title":"感謝。","url":"http://blog.nogizaka46.com/mai.shiraishi/2020/01/054325.php","content":"<html><head><meta http-equiv=\"Content-Type\" content=\"text/html; charset=UTF-8\"></head><body>おはようございます<div>&nbsp;</div><div><br><div><div>&nbsp;</div><div>&nbsp;</div><div>今朝のスポーツ紙や公式サイトで発表がありました通り、次のシングルをもちまして乃木坂46を卒業します。</div></div><div>&nbsp;</div><div>&nbsp;</div><div>2020年始まったばかりなのに、最初のブログが卒業の話しでごめんなさい。</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>卒業は2年前、25歳を迎えた辺りからずっと考えていました。</div><div>&nbsp;</div><div>&nbsp;</div><div>もうそろそろ、もうそろそろとずっと思っていたのですが、卒業するメンバーも増えていって、みんなには笑顔で旅立って行ってほしいなという気持ちと同時に私はもう少し乃木坂で頑張ろうかなという思いが強くなっていって、気付いたらここまできていました。</div><div>&nbsp;</div><div>&nbsp;</div><div>後輩も頼もしく成長していき、私ももう乃木坂で甘えてられないなと思い昨年の夏頃に改めて卒業のことを考え決断致しました。</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>乃木坂で過ごした約8年は私にとってすごく大事な時間でしたし、たくさん自分と向き合うことができた時間でした。</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>乃木坂に入って大好きなメンバーと出会い、応援してくださる大切なファンの皆さんとも出会うことができました。</div><div>&nbsp;</div><div>たくさんの声援をもらい、「頑張ってね」「応援してます」って言葉にたくさん救われました。</div><div>&nbsp;</div><div>&nbsp;</div><div>皆さんのおかげでこうして乃木坂46のメンバーで居続けることができました。本当にありがとうございます。</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>卒業しても乃木坂は大好きなグループ、ずっと大事にしていきたいですし、次は外側から乃木坂を支えていけたらなと思っています。</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>まだこれからバースデーライブもありますし、卒業ライブも出来たらいいなと思ってるので残りの時間も笑顔で楽しく過ごせたらなと思っております^ ^</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>寂しいけど寂しい気持ちは置いといて、2020年も乃木坂にとって素敵な一年になりますように。</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>私も最後まで頑張ります。</div><div>&nbsp;</div><div>よろしくお願いします</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>&nbsp;</div><div>白石麻衣</div></div></body></html> "},{"datetime":"2019/12/31 20:10","author":"白石麻衣","title":"39。","url":"http://blog.nogizaka46.com/mai.shiraishi/2019/12/054285.php","content":"<p><meta http-equiv=\"Content-Type\" content=\"text/html; charset=UTF-8\"></p>\n<div>今年も一年ありがとうございました！</div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div>7thバースデーライブや演技のお仕事、たくさんのファッション誌にも出させて頂きました。</div>\n<div> </div>\n<div> </div>\n<div>どのお仕事もとても楽しくたくさん勉強にもなりましたし、少しだけだけどステップアップ出来たかなと思います。</div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div>年末はたくさんの音楽番組にも呼んで頂いて、後輩達がどんどん成長していくのを間近で感じました。</div>\n<div>本当に頼もしいものです！</div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div>来年も現状維持で、色んなお仕事に関われたらいいなぁと思います。</div>\n<div> </div>\n<div>2020年も頑張るぞ〜！</div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div>残るは紅白、この後です！</div>\n<div> </div>\n<div> </div>\n<div>初の坂道グループ全員、そして内村さんも一緒にパフォーマンスします！素敵な物をお届けできるよう精一杯頑張りたいとおもいます^_^</div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div>昨日のレコード大賞も楽しかったな〜！</div>\n<div>緊張したけど、みんなでhappyを届けられるようにとパフォーマンスしました！</div>\n<div>毎年良い思い出♡</div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div>2020年も楽しい年にしようね〜^_^</div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div>少し早いけど、</div>\n<div> </div>\n<div>皆さん良いお年を！</div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div><img src=\"img/blog/mai.shiraishi/img/2019/12/31/9044056/0000.jpeg\"></div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>\n<div> </div>"}]; </script>
