<body>
    <div id="app">
        <button id="btn-toggle" :class="{'hide':isFold}" @click="onToggle()"><img src="../menu.svg" alt=""></button>
        <div class="member" :class="{'hide':isFold}">
            <img :src="member.image" alt="" class="avatar">
            <div class="name">{{member.name}}</div>
            <div class="name hiragana">{{member.name_hiragana}}</div>

            <ul class="intro">
                <li v-for="item in member.intro">
                    <span class="key">{{item.key}}</span>
                    <span class="value">{{item.value}}</span>
                </li>
            </ul>

            <ul class="tag">
                <li v-for="item in member.tag">{{item}}</li>
            </ul>
        </div>

        <div class="menu" :class="{'hide':isFold}">
            <div class="loading-spinner" v-if="isLoading"><div class="spinner"></div></div>
            <ul>
                <li v-for="(item,index) in list" v-on:click="onListSelected(index)" :class="index==selected?'selected':''">
                    <div v-html="item.title"></div>
                    <div v-if="item.title.length==0">&nbsp;&nbsp;&nbsp;</div>
                    <div class="small-datetime">{{item.datetime}}</div>
                </li>
            </ul>
        </div>

        <div class="main" v-if="currentPost!=null">
            <div class="heading">
                <a class="post-time" :href="currentPost.url" target="_blank">

                    <span class="date">{{currentPostDate.date}}</span>
                    <span class="week">{{currentPostDate.weekday}}</span>
                </a>
                <div class="post-info">
                    <div class="author">{{currentPost.author}}</div>
                    <div class="title" v-html="currentPost.title"></div>
                </div>
            </div>
            <span class="content" v-html="currentPost.content"></span>
        </div>
    </div>

2/08/9540456/0003.jpeg\"></a></div><div> </div><div>発売中のMdN、</div><div>トイが表紙になってます。</div><div> </div><div>SUNNY AND BLUEという</div><div>付録ブックレット付いてます。</div><div> </div><div>私の6年間をすごく贅沢に</div><div>かっこよくしてもらってる、</div><div>映像と個展のまとめ本です。</div><div> </div><div>あのMdNさんから自分の付録が</div><div>出るなんて信じられないのよ、、</div><div>読んだけど、これが世に出てるのかと</div><div>思うと変な気持ちです。</div><div>よかったらみなさんも読んでください</div><div> </div><div> </div><div>そして、2年半続いた連載</div><div>MARIKA meets CREATORSは</div><div>30回目を迎え、ついに最終回です、、</div><div>ついに、、</div><div> </div><div>最後のお相手は、映像監督の湯浅弘章さん！</div><div>&nbsp;</div><div>辛い時、必ず湯浅さんの作品が</div><div>あった気がします。</div><div>グループの1人のメンバーとして</div><div>目を逸らさずに、真摯に向き合えたのは</div><div>湯浅監督の作品があったからだなあ</div><div>と思う、</div><div>最後に一緒に振り返れてよかった。</div><div> </div><div> </div><div>思えば、連載が始まって今日まで</div><div>編集長の本信さんに</div><div>何度も助けられました。</div><div>&nbsp;</div><div>答えをポンと出してくれた時に</div><div>素直に受け入れることができたのは</div><div>本信さんだからだなあと思う。</div><div>お世話になりました。</div><div> </div><div><a href=\"http://dcimg.awalker.jp/img1.php?id=l8Xx7rtGifbljHgHWk4XFFwrXq4JIYWqBUt1UZUbx5jZB4N4WtlL9QFhmiIpmcm0P2PMAmhFNaXAtFVlKSY6fi90Fe3r7NxBFbYbEyk66wi0gzKENhCNjI1aebxxR2UNpoCjebfLGxyNJAb9nSD6UyZLgx0bouRJlxUCPKnnFFAMHJKtt78syUySgEslJGj1p1TAIBhA\"><img src=\"img/blog/marika.ito/img/2017/12/08/9540456/0004.jpeg\"></a></div><div> </div><div>連載終了は寂しい気もしますが、</div><div>私にとっちゃ</div><div>2年半続いたことが奇跡です！！！！！</div><div>拙いインタビュアーでしたが、</div><div>どうだったんでしょうか、、</div><div>つくる人ってかっこいい。</div><div>本当にありがとうございました。</div><div> </div><div> </div><div> </div><div> </div><div> </div><div>1st写真集、香港に行きました。</div><div> </div><div>撮影は乃木坂派以来4年ぶりの</div><div>大江麻貴さん。</div><div> </div><div>本日発売の</div><div>乃木坂46×週刊プレイボーイ2017</div><div>裏表紙にも中ページにも</div><div>写真集の一部が掲載されています。</div><div>集英社インターナショナルさんから</div><div>2018年2月20日発売予定。</div><div> </div><div>@nounaihakurankai</div><div>伊藤万理華の脳内博覧会→1st写真集official</div><div><a href=\"http://instagram.com/nounaihakurankai\">http://instagram.com/nounaihakurankai</a></div><div> </div><div>情報は引き続き、こちらに更新します。</div><div>&nbsp;</div><div> </div><div>脳内博覧会に加えて</div><div>MdNブックレットと写真集。</div><div>また宝物が増えた気持ちです。</div><div>興味があれば！！！！、！、見てほしいです！</div><div> </div><div> </div><div> </div><div>まりか</div>"},{"datetime":"2017/11/10 22:06","author":"伊藤万理華","title":"きっかけ。787回目","url":"http://blog.nogizaka46.com/marika.ito/2017/11/041787.php","content":"<div> </div>\n<div> </div>\n<div><a href=\"http://dcimg.awalker.jp/img1.php?id=V6REsVtxlKTbGXerJ7mNiUdkDG2c0rhuMiKW5QWox7qmYNHIo7PiI71eMNvyRxjuo95PMI2ipv1pysKYRwG9C5yBI6yN9ebYuwQ2ZX61fv57MY8ZQMa98OyQpceeZ32fS9qZNtKkhAbjipYsx5584LpfW5mC6HxLpZqDsMsOIgt4LNKTuJtLBKj2jAZ5O6g8JmqBwsmW\"><img src=\"img/blog/marika.ito/img/2017/11/10/1913377/0000.jpeg\"></a></div>\n<div> </div>\n<div>真夏の全国ツアー2017ファイナル</div>\n<div>東京ドーム2days完走しました！</div>\n<div> </div>\n<div> </div>\n<div>ライブで徹してることがずっとあるのですが、</div>\n<div>それは、誰よりもいちばん楽しむことです。</div>\n<div> </div>\n<div>ステージで衣装を着て</div>\n<div>パフォーマンスしてる時だけは</div>\n<div>変な殻も全部捨てて</div>\n<div>自分がいちばんだと思い込むこと。</div>\n<div> </div>\n<div>私が唯一、自信を持ってできることでした。</div>\n<div> </div>\n<div>それはどのステージでも同じことで、</div>\n<div>絶対誰かが見てくれるから。</div>\n<div> </div>\n<div>だから、誰かの目にとまるよう</div>\n<div>いつも全身全霊でした。</div>\n<div> </div>\n<div></div>\n<div>少しでも目にとまったなら嬉しいです！</div>\n<div> </div>\n<div> </div>\n<div>どの瞬間もずっと忘れないんだろうなあ</div>\n<div>一緒に歌って踊るみんな、</div>\n<div>かっこよくて美しくて華やかで</div>\n<div>やっぱりすげえと思った。</div>\n<div>お客さんからのサプライズも</div>\n<div>嬉しかった。</div>\n<div>ステージのいちばん上から見た景色</div>\n<div>綺麗だった。</div>\n<div> </div>\n<div> </div>\n<div>きっかけ</div>\n<div>迷っていた時期にやっと決心できた瞬間が</div>\n<div>アンダーライブ中国地方で歌った</div>\n<div>きっかけでした。</div>\n<div>あの時から私の中のテーマ曲。</div>\n<div>最後の最後に歌えて良かった。</div>\n<div>ありがとう！</div>\n<div> </div>\n<div>花道を隣で歩いてくれた玲香の顔が</div>\n<div>忘れられないぜー</div>\n<div>泣きたくなかったな</div>\n<div> </div>\n<div>披露した曲全部思い入れ深い。</div>\n<div>あらロマも他の星からも</div>\n<div>ここにいる理由も生まれたままでも咄嗟も</div>\n<div>インフルエンサーも！</div>\n<div>東京ドームでパフォーマンスできてよかった！</div>\n<div> </div>\n<div> </div>\n<div><a href=\"http://dcimg.awalker.jp/img1.php?id=FZm9jWslD8HwAa4rBquS1LLdnf60LdZ7jRdVKDicyltJS3BXfwJNogJ
